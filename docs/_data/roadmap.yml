semesters:
  - badge: "S1"
    title: "Semester 1"
    subtitle: "Foundation & Data"
    badge_class: ""
    line_class: ""
    milestones:
      - icon: "fa-server"
        title: "Infrastructure Setup"
        description: "Set up GPU compute infrastructure, Jupyter Notebook environments, and data engineering workflows on remote servers."
        marker_class: ""
      - icon: "fa-broom"
        title: "Data Preparation"
        description: "Explore weather and observational datasets, validate source quality, clean and normalize records to produce high-quality validated datasets for machine learning."
        marker_class: ""
      - icon: "fa-magnifying-glass-chart"
        title: "Baseline Analysis"
        description: "Build baseline analytical and predictive models to analyze spatial coverage, temporal patterns, and metadata to organize large datasets."
        marker_class: ""

  - badge: "S2"
    title: "Semester 2"
    subtitle: "Modeling & Evaluation"
    badge_class: "s2"
    line_class: "s2-line"
    milestones:
      - icon: "fa-wind"
        title: "Forecast Modelling"
        description: "Build and refine nowcasting models using prepared datasets. Experiment with regional forecasting and rainfall or severe-weather nowcasting workflows."
        marker_class: "s2"
      - icon: "fa-scale-balanced"
        title: "Model Evaluation"
        description: "Develop domain-specific forecast evaluation pipelines and understand how datasets shape forecast behavior."
        marker_class: "s2"
      - icon: "fa-file-contract"
        title: "Performance Reports"
        description: "Produce forecast outputs and performance reports. Execute large training jobs on dedicated GPU servers and A100 clusters."
        marker_class: "s2"
