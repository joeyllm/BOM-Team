<div class="semester-block mb-4">
    <div class="semester-header is-flex is-align-items-center mb-4">
        <div class="semester-badge{% if include.badge_class %} {{ include.badge_class }}{% endif %}">{{ include.badge }}</div>
        <div class="semester-info ml-3">
            <h3 class="semester-title">{{ include.title }}</h3>
            <span class="semester-subtitle">{{ include.subtitle }}</span>
        </div>
        <div class="semester-line{% if include.line_class %} {{ include.line_class }}{% endif %} ml-3"></div>
    </div>
    <div class="milestone-list is-flex is-flex-direction-column">
        {{ include.content }}
    </div>
</div>
