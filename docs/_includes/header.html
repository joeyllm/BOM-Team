<header class="site-header">
    <div class="header-border"></div>
    <div class="container">
        <a href="{{ site.baseurl }}/" class="header-logo">
            <span class="logo-type">{{ site.title }}</span>
        </a>
        
        <nav class="header-nav">
            {% for item in site.data.nav %}
                {% assign item_url = item.url | relative_url %}
                <a href="{{ item_url }}" class="nav-link{% if page.url == item.url or page.url == item_url %} active{% endif %}">
                    {{ item.title }}
                </a>
            {% endfor %}
        </nav>

        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
            <span></span>
            <span></span>
        </button>
    </div>
</header>
