<div class="milestone-item">
    <div class="milestone-marker{% if include.marker_class %} {{ include.marker_class }}{% endif %}">
        <i class="fa-solid {{ include.icon }}"></i>
    </div>
    <div class="milestone-content">
        <h4>{{ include.title }}</h4>
        <p>{{ include.description }}</p>
    </div>
</div>
