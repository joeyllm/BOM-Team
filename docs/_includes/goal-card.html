<div class="goal-card" data-aos="fade-up" data-aos-delay="{{ include.delay | default: 0 }}">
    <div class="goal-icon">
        <i class="fa-solid {{ include.icon }}"></i>
    </div>
    <div class="goal-content">
        <h4>{{ include.title }}</h4>
        <p>{{ include.description }}</p>
    </div>
</div>
