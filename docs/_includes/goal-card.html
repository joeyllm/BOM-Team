<div class="goal-card is-flex is-align-items-flex-start" data-aos="fade-up" data-aos-delay="{{ include.delay | default: 0 }}">
    <div class="goal-icon is-flex-shrink-0">
        <i class="fa-solid {{ include.icon }}"></i>
    </div>
    <div class="goal-content ml-4">
        <h4>{{ include.title }}</h4>
        <p>{{ include.description }}</p>
    </div>
</div>
