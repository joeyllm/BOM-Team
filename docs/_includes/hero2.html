<div class="index-shadow-bottom">
    <div class="container my-0">
        <div class="hero is-medium my-0">
            <div class="hero-body py-6">
                <div class="container has-text-left">
                    
                    <!-- Title -->
                    <div class="hero-title-wrapper">
                        <h1 class="title index-title">
                            <span class="title-line">{{ include.title | default: "About" }}</span>
                            <span class="title-line highlight">{{ include.subtitle | default: "Us" }}</span>
                        </h1>
                        <div class="title-underline">
                            <div class="underline-glow"></div>
                        </div>
                    </div>
                    
                    <!-- Subtitle -->
                    <div class="subtitle index-subtitle">
                        <span class="subtitle-text">{{ include.description | default: "Meet the team behind the project" }}</span>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</div>
